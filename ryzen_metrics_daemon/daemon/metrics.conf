# --- Ryzen System Metrics: Full Calibration Configuration ---

# --- Zone 1: Fast Lane (Shared RAM) ---
path_panel=/dev/shm/system_metrics_panel.json
path_tooltip=/dev/shm/system_metrics_tooltip.txt

# --- Zone 2: Persistence (Local SSD) ---
# Audited: Points to the verified absolute path
path_data_file=/home/rob/.config/ryzen_metrics_daemon_release/stats.dat

# --- General Settings ---
# Audited: Hardcoded to prevent historical resets
start_date=28-01-2026
update_ms=1000
sync_sec=300
euro_per_kwh=0.26

# --- Ghost-Buster Calibration (kernel Hysteria SoC Filter) ---
ghost_freq_min=3000
ghost_watt_max=3.5
ghost_floor=0.05

# --- Power Constants (8700G Passive Block) ---
psu_efficiency=0.82
mobo_overhead=0.05
pc_rest_base=7.1
periph_watt=3.5

# --- Monitor (Lenovo ThinkVision P34WD-40) ---
mon_logic=12.0
mon_backlight_max=26.0
mon_standby=0.5
mon_dim_preset=0.2
mon_brightness_preset=0.45

# --- Speakers (Klipsch The Fives) ---
speakers_eco=2.0
speakers_standby=10.0
speakers_active=35.0
speakers_timeout_sec=900

# --- Visuals ---
font_size=9
font_family=Monospace
color_safe=#ccccff
color_warn=#EBCB8B
color_crit=#BF616A
color_sep=#008bd1
ssd_label=SSD

# --- Thresholds ---
limit_mhz_warn=4000.0
limit_mhz_crit=4800.0
limit_ram_warn=55.0
limit_ram_crit=75.0
limit_net_warn=60.0
limit_net_crit=75.0
limit_soc_power_warn=65.0
limit_soc_power_crit=85.0
limit_wall_warn=140.0
limit_wall_crit=180.0

# --- Thermal Model (Maturity) ---
maturity_threshold_teff=39.0
maturity_required_sec=1800
trend_break_delta=5.0
